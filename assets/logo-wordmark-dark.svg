<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" role="img"
     aria-label="BjLocationData logo">
  <title>BjLocationData</title>

  <defs>
    <linearGradient id="lwd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a358a"/>
      <stop offset="60%" stop-color="#0e3fa8"/>
      <stop offset="100%" stop-color="#1146b8"/>
    </linearGradient>
    <radialGradient id="lwd-halo" cx="0" cy="0" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#5b8cff" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <style><![CDATA[
      .name { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
              font-weight: 600; letter-spacing: -0.02em; fill: #ffffff; }
      .tag  { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
              fill: #a1a1a1; font-weight: 500; letter-spacing: 0.01em; }
    ]]></style>
  </defs>

  <!-- ─── Mark on the left (140 × 140 box) ─────────────────── -->
  <g transform="translate(20,30)">
    <rect width="140" height="140" rx="32" fill="url(#lwd-bg)"/>
    <rect width="140" height="140" rx="32" fill="url(#lwd-halo)"/>
    <!-- Map pin -->
    <path d="M70 24 C54 24 41 37 41 53 C41 75 70 116 70 116 C70 116 99 75 99 53 C99 37 86 24 70 24 Z"
          fill="#34d399" fill-opacity="0.90"/>
    <circle cx="70" cy="53" r="13" fill="#0e3fa8"/>
    <circle cx="70" cy="53" r="7" fill="#34d399" fill-opacity="0.35"/>
  </g>

  <!-- ─── Wordmark on the right (white for dark backgrounds) ─ -->
  <text x="194" y="112" class="name" font-size="60">BjLocationData</text>
  <text x="196" y="148" class="tag"  font-size="17">Location data for Benin Republic</text>
</svg>
